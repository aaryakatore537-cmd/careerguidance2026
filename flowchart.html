<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Roadmap - Flow Diagram</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --accent: #3b82f6;
            --success: #22c55e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .flow-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 800px;
            width: 100%;
        }

        .node {
            background: var(--card);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 1;
            min-width: 180px;
        }

        .node.start {
            border: 2px solid var(--primary);
            border-radius: 50px;
        }

        .node.decision {
            background: var(--secondary);
            border: none;
            transform: rotate(0deg);
            border-radius: 12px;
        }

        .node.process {
            border-left: 5px solid var(--accent);
        }

        .node.success {
            border: 2px solid var(--success);
            border-radius: 50px;
            background: rgba(34, 197, 94, 0.1);
            color: var(--success);
            font-weight: bold;
        }

        .arrow {
            width: 2px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .arrow::after {
            content: '▼';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }

        .split-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            position: relative;
        }

        .split-line {
            position: absolute;
            top: -20px;
            left: 50%;
            width: calc(100% - 200px);
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(-50%);
        }

        .sub-flow {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
            display: block;
        }

        .header-info {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-info h1 {
            margin: 0;
            font-size: 2rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-info p {
            color: #94a3b8;
            font-size: 1rem;
        }

        .screenshot-hint {
            margin-top: 40px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>

<body>

    <div class="header-info">
        <h1>Project Architecture Flow</h1>
        <p>User Journey & System Logic</p>
    </div>

    <div class="flow-container">
        <!-- Entry -->
        <div class="node start">
            <span class="icon">👤</span>
            User Entry
        </div>
        <div class="arrow"></div>

        <div class="node">
            <span class="icon">🔒</span>
            Secure Authentication
        </div>
        <div class="arrow"></div>

        <!-- Dashboard Decision -->
        <div class="node decision">
            <span class="icon">🏠</span>
            Main Dashboard
        </div>

        <!-- Paths -->
        <div class="split-container">
            <div class="sub-flow">
                <div class="arrow"></div>
                <div class="node process">
                    <span class="icon">🏫</span>
                    After Class 10th
                </div>
                <div class="arrow"></div>
                <div class="node">
                    Technical | Govt Job
                </div>
            </div>

            <div class="sub-flow">
                <div class="arrow"></div>
                <div class="node process">
                    <span class="icon">🏛️</span>
                    After Diploma
                </div>
                <div class="arrow"></div>
                <div class="node">
                    AI | Engineering | Tech
                </div>
            </div>
        </div>

        <!-- Conclusion -->
        <div class="arrow"></div>
        <div class="node">
            <span class="icon">📄</span>
            Detailed Roadmap View
        </div>
        <div class="arrow"></div>
        <div class="node success">
            <span class="icon">🚀</span>
            CAREER SUCCESS
        </div>
    </div>

    <div class="screenshot-hint">
        Tip: Press <strong>Win + Shift + S</strong> to capture this diagram for your PPT
    </div>

</body>

</html>
