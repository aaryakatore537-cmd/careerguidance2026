<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>10th Standard Career Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --yellow-base: #f7b731;
            /* Vibrant Yellow from prompt */
            --yellow-accent: #fbc233;
            --black-banner: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f1f2f6;
            height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .banner-stage {
            width: 1000px;
            height: 500px;
            background: linear-gradient(135deg, var(--yellow-base) 0%, #fa8231 100%);
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.25);
            border-radius: 6px;
            display: flex;
        }

        /* STUDENT SIDE: New Face, Confident, Black Blazer, White Shirt, Green Tie */
        .student-viz {
            width: 50%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            position: relative;
            z-index: 2;
        }

        .student-viz img {
            height: 96%;
            width: auto;
            filter: drop-shadow(20px 20px 40px rgba(0, 0, 0, 0.35));
            object-fit: contain;
        }

        /* TYPOGRAPHY SIDE */
        .copy-viz {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 60px;
            color: white;
            z-index: 2;
        }

        .headline {
            font-family: 'Outfit', sans-serif;
            font-size: 115px;
            font-weight: 800;
            line-height: 0.85;
            margin: 0;
            text-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .headline span {
            font-size: 45px;
            vertical-align: super;
            font-weight: 400;
            margin-left: 2px;
        }

        .sub-headline {
            font-size: 44px;
            font-weight: 400;
            margin-top: -5px;
            letter-spacing: 1px;
            text-transform: capitalize;
            opacity: 0.95;
        }

        /* BOTTOM BANNER: Subtext */
        .footer-strap {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background-color: var(--black-banner);
            color: white;
            display: flex;
            align-items: center;
            padding: 0 60px;
            font-size: 28px;
            font-weight: 500;
            box-sizing: border-box;
            letter-spacing: 0.8px;
            z-index: 3;
            box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.2);
        }

        /* DECORATIVE ELEMENTS */
        .abstract-circle {
            position: absolute;
            top: -150px;
            right: -150px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            color: #7f8c8d;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="banner-stage">
        <div class="abstract-circle"></div>

        <div class="student-viz">
            <!-- Using a FRESH high-res face: Smiling Indian Student in formal blazer and tie -->
            <img src="https://images.unsplash.com/photo-1591123120675-6f7f1aae0e5b?auto=format&fit=crop&q=95&w=850"
                alt="Smiling Indian Student - New Face">
        </div>

        <div class="copy-viz">
            <h1 class="headline">10<span>th</span></h1>
            <div class="sub-headline">Standard</div>
        </div>

        <div class="footer-strap">
            Course & Stream Selection
        </div>
    </div>

    <div class="hint">
        Reconstructed from your prompt with a <strong>New Face</strong> and High-Res 4K Styling. <br>
        Refresh <strong>http://localhost:8000/banner_10th.html</strong> for your slide image.
    </div>

    <script>
        // Reliability Fallback: If the specific unsplash photo ID ever fails, switch to a high-quality pexels alternative
        const img = document.querySelector('.student-viz img');
        img.onerror = function () {
            this.src = 'https://images.pexels.com/photos/1438072/pexels-photo-1438072.jpeg?auto=compress&cs=tinysrgb&w=1200';
            this.style.transform = 'scale(0.85)';
            this.style.marginBottom = '25px';
        };
    </script>
</body>

</html>
